<!doctype html>
<html lang="pt-br">
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
  </head>

  <body class="bg-zinc-200">
    <main class="flex items-center justify-center min-h-screen p-6">
      <div class="flex w-full max-w-5xl overflow-hidden rounded-2xl shadow-xl">
        <!-- LADO ESQUERDO -->
        <section class="hidden md:flex md:w-1/2 bg-zinc-100 p-12">
          <div class="flex flex-col justify-between w-full"></div>
        </section>

        <!-- LADO DIREITO -->
        <section class="w-full md:w-1/2 bg-white p-10 md:p-14">
          <div class="max-w-md mx-auto">
            <div class="mb-8">
              <h1 class="text-3xl font-semibold text-zinc-900">
                Criar sua conta
              </h1>

              <p class="mt-2 text-sm text-zinc-500">
                Preencha os dados abaixo para começar.
              </p>
            </div>

            <form class="space-y-5">
              <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-zinc-700">
                  Nome completo
                </label>

                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Seu nome"
                  class="w-full h-12 px-4 rounded-lg border border-zinc-300 outline-none focus:ring-2 focus:ring-black"
                />
              </div>
              <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-zinc-700">
                  E-mail
                </label>

                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="seu@email.com"
                  class="w-full h-12 px-4 rounded-lg border border-zinc-300 outline-none focus:ring-2 focus:ring-black"
                />
              </div>
              <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-zinc-700">
                  Senha
                </label>

                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="********"
                  class="w-full h-12 px-4 rounded-lg border border-zinc-300 outline-none focus:ring-2 focus:ring-black"
                />
              </div>
              <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-zinc-700">
                  Confirmar senha
                </label>

                <input
                  type="password"
                  id="confirm-password"
                  name="confirm-password"
                  placeholder="********"
                  class="w-full h-12 px-4 rounded-lg border border-zinc-300 outline-none focus:ring-2 focus:ring-black"
                />
              </div>
              <div>
                <input type="checkbox" />

                <label>
                  Aceito os
                  <a href="#"> termos de uso </a>
                  e a
                  <a href="#"> política de privacidade </a>
                </label>
              </div>
              <button type="submit">Criar conta</button>
            </form>
            <div>
              Já tem conta?

              <a href="#"> Entrar </a>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
