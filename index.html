<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Erro 404</title>
</head>
<body>
<main class="h-screen flex p-14 bg-[#ECE9E0]">  
    
<!-- ladoesquerdo  -->
    <div class="flex flex-col justify-between bg-[#F7F5EF] h-full w-full rounded-l-2xl p-12">

        <div class="flex gap-2 items-center">
            <div class=" bg-black rounded-lg h-[30px] w-[30px]"> </div>
            <p class="font-medium">Logo</p>
        </div>

        <div class="flex flex-col items-center">
            <h1 class="text-center leading-none font-medium text-[100px]">404<br />... </h1>
            <!-- <p class="text-[80px] text-gray-400 bg-red-600" >...</p> -->
        </div>

        <div class="">
            <p class="text-[#6B6B66] ">Código de erro: HTTP 404</p>
        </div>

    </div>


    <div class="ladodireitro w-full h-full bg-white rounded-r-2xl flex flex-col justify-center p-12 gap-4">
        <p class="text-[#3276EF] text-xs tracking-wider">OPS, ALGO DEU ERRADO</p>
        <h1 class="font-medium text-3xl -tracking-wider">Não encontramos <br /> essa página</h1>
        <p class="text-[#6B6B66] text-sm leading-relaxed">A URL pode estar incorreta ou o conteúdo pode ter sido removido. <br /> 
        Verifique o endereço ou volte ao início para continuar navegando.
        </p>

        <section class="flex gap-4 my-4">
            <button class="bg-black text-white py-2 px-6 rounded-xl cursor-pointer hover:bg-slate-600 hover:transition-all">Voltar ao início</button>
            <button class="py-2 px-6 rounded-xl border-[#D9D9D9] border-2 cursor-pointer hover:bg-slate-300 hover:transition-all">Reportar problema</button>
        </section>

        <hr class="border-t-1 border-gray-300" />

        <footer class="flex gap-1 ">
            <p class="text-[#6B6B66] text-sm ">Precisa de ajuda?</p>
            <a href="" class="text-[#3276EF] text-sm hover:text-blue-800 ">Fale com o suporte</a>
        </footer>

    </div>

</main>


    
</body>
</html>
